<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Commitment — CharterSelect</title>
  <meta name="description" content="CharterSelect was founded on a simple idea: insurance done well puts more money back into classrooms and more support back into communities." />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css?v=2" />
  <link rel="icon" href="assets/logo-icon.png" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx?v=3"></script>
  <script type="text/babel" src="_page-shell.jsx"></script>
  <script type="text/babel">
    const PILLARS = [
      {
        icon: 'sprout',
        title: 'Strong schools.',
        body: 'Every dollar saved on insurance is a dollar that can stay in the classroom — for teachers, students, and the operations that hold a campus together.',
      },
      {
        icon: 'users-round',
        title: 'Strong communities.',
        body: 'A portion of CharterSelect profits is directed to nonprofits and community initiatives that work alongside the schools we serve.',
      },
      {
        icon: 'compass',
        title: 'Honest counsel.',
        body: 'We tell schools when to switch and when to stay. The relationship matters more than any single renewal — and that\'s how we measure ourselves.',
      },
    ];

    function CommitmentPage() {
      return (
        <PageShell
          screen="Our Commitment"
          eyebrow="Stronger Together"
          title="Strong schools build strong communities."
          lead="CharterSelect was founded on a simple idea: insurance done well puts more money back into classrooms and more support back into communities.">
          <section className="cs-section" style={{paddingTop: 56, paddingBottom: 64}}>
            <div className="cs-prose">
              <div className="cs-detail-grid" style={{gridTemplateColumns: 'repeat(3, 1fr)'}}>
                {PILLARS.map(p => (
                  <article className="cs-detail" key={p.title}>
                    <div className="cs-detail__head">
                      <div className="cs-card__icon"><Lucide name={p.icon} size={22} /></div>
                      <h3>{p.title}</h3>
                    </div>
                    <p style={{marginBottom: 0}}>{p.body}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>

          <section className="cs-section cs-section--cream" style={{paddingTop: 56, paddingBottom: 80}}>
            <div className="cs-prose">
              <div style={{display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 64, alignItems: 'center'}}>
                <div>
                  <div className="cs-eyebrow">Where the giving goes</div>
                  <h2 style={{marginTop: 8}}>A portion of every policy supports the work around the school.</h2>
                  <p>Charter schools rarely operate in isolation. The strongest campuses sit inside neighborhoods full of nonprofits, mentors, and family-support organizations doing the quieter work — the work that lets a child show up ready to learn.</p>
                  <p>CharterSelect commits a share of profits each year to those organizations. We let school leaders nominate causes that matter in their communities, and we publish where the funds go.</p>
                  <p>It's a small thing in any single year. Over a decade of partnership, it adds up.</p>
                </div>
                <div className="cs-community__seal">
                  <img src="assets/logo-badge.png" alt="CharterSelect badge" />
                </div>
              </div>
            </div>
          </section>

          <section className="cs-section" style={{paddingTop: 64, paddingBottom: 64}}>
            <div className="cs-prose">
              <div className="cs-eyebrow">Our promise</div>
              <h2 style={{marginTop: 8}}>What you can expect from us.</h2>
              <ul>
                <li><strong>Independent advice.</strong> We benchmark across carriers and tell you when to stay put.</li>
                <li><strong>Responsiveness.</strong> Not having to follow up with us allows you to focus on running the school.</li>
                <li><strong>A named advisor.</strong> No need to remember a depth chart — you know who to call, text, or email and we'll take care of the rest.</li>
                <li><strong>Year-round availability.</strong> Renewals are a moment, not the relationship.</li>
                <li><strong>Mission alignment.</strong> A portion of profits supports the communities you serve.</li>
              </ul>
            </div>
          </section>

          <section className="cs-cta-strip">
            <div className="cs-cta-strip__inner">
              <div>
                <h2>Let's start a conversation.</h2>
                <p>Whether you're due for a renewal or just curious how your coverage compares, we'd love to hear from you.</p>
              </div>
              <a className="cs-btn cs-btn--gold" href="index.html#contact">Get in Touch <Lucide name="arrow-right" size={18} /></a>
            </div>
          </section>
        </PageShell>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CommitmentPage />);
  </script>
</body>
</html>
