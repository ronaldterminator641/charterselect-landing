<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Renewal Report Card — CharterSelect</title>
  <meta name="description" content="A comprehensive renewal checklist for charter school insurance — walk through every coverage area before your next renewal." />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css?v=2" />
  <link rel="icon" href="assets/logo-icon.png" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── Page hero ── */
    .rrc-hero {
      background: var(--cs-teal);
      padding: 48px 32px 52px;
    }
    .rrc-hero__inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .rrc-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 140ms;
    }
    .rrc-back:hover { color: #fff; }
    .rrc-hero__eyebrow {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cs-gold);
      margin-bottom: 8px;
    }
    .rrc-hero__title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      color: #fff;
      margin: 0 0 12px;
    }
    .rrc-hero__lead {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(255,255,255,0.85);
      margin: 0;
      max-width: 58ch;
    }

    /* ── Bandwidth CTA widget ── */
    .rrc-bandwidth {
      background: var(--cs-gold-50);
      border: 1.5px solid var(--cs-gold);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin: 32px auto;
      max-width: 900px;
    }
    .rrc-bandwidth__text {
      font-size: 15px;
      font-weight: 600;
      color: var(--cs-charcoal);
      margin: 0;
    }
    .rrc-bandwidth__text span {
      color: var(--cs-teal-700);
    }
    .rrc-bandwidth__actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    /* ── Modal overlay ── */
    .rrc-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .rrc-modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
    }
    .rrc-modal__close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-muted);
      padding: 4px;
      display: flex;
    }
    .rrc-modal__title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 400;
      color: var(--fg-1);
      margin: 12px 0 8px;
    }
    .rrc-modal__sub {
      font-size: 14px;
      color: var(--fg-muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .rrc-modal__actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .rrc-modal__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 999px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 140ms, color 140ms;
    }
    .rrc-modal__btn--teal { background: var(--cs-teal); color: #fff; }
    .rrc-modal__btn--teal:hover { background: var(--cs-teal-700); }
    .rrc-modal__btn--outline { background: #fff; color: var(--cs-teal); border: 1.5px solid var(--cs-teal); }
    .rrc-modal__btn--outline:hover { background: var(--cs-teal-50); }

    /* ── Checklist body ── */
    .rrc-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }
    @media (max-width: 600px) { .rrc-body { padding: 0 16px 60px; } }

    /* ── Section cards ── */
    .rrc-section {
      margin-bottom: 28px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-1);
    }
    .rrc-section__header {
      background: var(--cs-teal);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rrc-section__title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      color: #fff;
      margin: 0;
    }
    .rrc-section__icon {
      color: var(--cs-gold);
      flex-shrink: 0;
    }
    .rrc-section__body {
      background: #fff;
      padding: 20px 24px 24px;
    }

    /* ── Checklist items ── */
    .rrc-items {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .rrc-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .rrc-item__cb {
      width: 20px;
      height: 20px;
      border: 2px solid var(--cs-teal);
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background: #fff;
      transition: background 140ms, border-color 140ms;
      position: relative;
    }
    .rrc-item__cb:checked {
      background: var(--cs-teal);
      border-color: var(--cs-teal);
    }
    .rrc-item__cb:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 6px;
      height: 11px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .rrc-item__label {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--fg-2);
      flex: 1;
    }
    .rrc-item__label strong {
      color: var(--fg-1);
      font-weight: 600;
    }

    /* ── Write-in area ── */
    .rrc-notes {
      width: 100%;
      min-height: 60px;
      border: 1.5px solid var(--border-1);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--fg-1);
      background: var(--cs-gray-50);
      resize: vertical;
      outline: none;
      transition: border-color 140ms;
      box-sizing: border-box;
    }
    .rrc-notes:focus { border-color: var(--cs-teal); background: #fff; }
    .rrc-notes::placeholder { color: var(--fg-muted); }
    .rrc-notes-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--cs-charcoal-3);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Bandwidth widget in page body ── */
    .rrc-bandwidth--body {
      background: var(--cs-teal);
      border: none;
      border-radius: 16px;
      padding: 32px 28px;
      margin-top: 16px;
      text-align: center;
    }
    .rrc-bandwidth--body .rrc-bandwidth__text {
      color: #fff;
      font-size: 18px;
      font-family: var(--font-display);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .rrc-bandwidth--body .rrc-bandwidth__sub {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 20px;
    }
    .rrc-bandwidth--body .rrc-bandwidth__actions {
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx?v=8"></script>
  <script type="text/babel">

    const CALENDAR_LINK = 'https://calendar.app.google/JmcCzGBFQQdTYA1b6';
    const EMAIL = 'mailto:aschwen@charterselect.com';

    const SECTIONS = [
      {
        id: 'property',
        icon: 'building-2',
        title: 'Property Coverage',
        items: [
          { id: 'p1', label: 'Bond covenants satisfied — coverage meets all requirements of facility leases and lender agreements.' },
          { id: 'p2', label: 'Deductible reviewed and appropriately funded.' },
          { id: 'p3', label: 'All locations confirmed and scheduled on policy.' },
          { id: 'p4', label: 'Equipment breakdown / boiler & machinery coverage in place where applicable.' },
        ],
      },
      {
        id: 'gl',
        icon: 'shield-check',
        title: 'Package Policy, Educators Legal Liability',
        items: [
          { id: 'gl1', label: <span><strong>Abuse &amp; Molestation:</strong> This is frequently sublimited or can even be compromised if not written properly. If claims made, confirm retro date reaches back far enough to cover liability for any prior unreported incidents.</span> },
          { id: 'gl2', label: 'Educators Legal Liability retro date confirmed and preserved from prior policy term.' },
          { id: 'gl3', label: 'General Liability limits adequate for all operations and contracts.' },
        ],
      },
      {
        id: 'umbrella',
        icon: 'layers',
        title: 'Umbrella / Excess',
        items: [
          { id: 'u1', label: 'Abuse, Auto, Workers Comp, General Liability, and Educators Legal Liability are all included as underlying policies.' },
        ],
      },
      {
        id: 'auto',
        icon: 'car',
        title: 'Auto & Vehicle Schedule',
        items: [
          { id: 'a1', label: 'All owned vehicles accurately listed and scheduled.' },
          { id: 'a2', label: 'Hired and non-owned auto coverage included.' },
          { id: 'a3', label: 'Driver roster reviewed annually.' },
        ],
      },
      {
        id: 'wc',
        icon: 'hard-hat',
        title: 'Workers Comp & Classification',
        items: [
          { id: 'wc1', label: 'Employee classifications and payroll reviewed.' },
          { id: 'wc2', label: 'All locations and estimated payroll confirmed on policy.' },
        ],
      },
      {
        id: 'specialty',
        icon: 'star',
        title: 'Specialty Lines',
        items: [
          { id: 's1', label: <span><strong>Crime / Employee Dishonesty:</strong> Some schools are required by contract with their authorizers to carry crime coverage or a surety bond for a specific limit. There is also meaningful overlap between cyber and crime policies on fraudulent wire transfers — we recommend carrying both. Confirm limit is in place and policy language is current.</span> },
          { id: 's2', label: <span><strong>Student Accident:</strong> Student accident coverage pays medical bills for students injured during school activities — whether uninsured, or to cover a family's out-of-pocket costs when they have insurance. This is distinct from general liability: GL responds to negligence; student accident pays regardless of fault. Many schools don't realize a student injury without negligence won't trigger GL — this coverage fills that gap.</span> },
          { id: 's3', label: 'Cyber Liability: policy in place, limits reviewed, and retention confirmed.' },
          { id: 's4', label: 'Directors & Officers / Management Liability in place.' },
        ],
      },
      {
        id: 'retro',
        icon: 'clock',
        title: 'Retroactive Dates & Claims History',
        items: [
          { id: 'r1', label: 'All claims-made policies: retro dates confirmed and preserved from prior policy term.' },
          { id: 'r2', label: 'Claims history reviewed and accurate.' },
        ],
      },
    ];

    function BandwidthModal({ onClose }) {
      return (
        <div className="rrc-modal-backdrop" onClick={onClose}>
          <div className="rrc-modal" onClick={e => e.stopPropagation()}>
            <button className="rrc-modal__close" onClick={onClose} aria-label="Close">
              <i data-lucide="x" style={{width:20,height:20}} />
            </button>
            <i data-lucide="calendar-heart" style={{width:40,height:40,color:'var(--cs-teal)',margin:'0 auto'}} />
            <h2 className="rrc-modal__title">Get a free review</h2>
            <p className="rrc-modal__sub">Let us walk through this with you — takes about 20 minutes and there's no obligation.</p>
            <div className="rrc-modal__actions">
              <a className="rrc-modal__btn rrc-modal__btn--teal" href={CALENDAR_LINK} target="_blank" rel="noopener noreferrer">
                <i data-lucide="calendar" style={{width:18,height:18}} />
                Book a Meeting
              </a>
              <a className="rrc-modal__btn rrc-modal__btn--outline" href={EMAIL}>
                <i data-lucide="mail" style={{width:18,height:18}} />
                Send an Email
              </a>
            </div>
          </div>
        </div>
      );
    }

    function BandwidthCta({ onOpen, dark }) {
      if (dark) {
        return (
          <div className="rrc-bandwidth--body">
            <p className="rrc-bandwidth__text">Don't have the bandwidth to go through this yourself?</p>
            <p className="rrc-bandwidth__sub">We'll walk through every item with you — free, no obligation.</p>
            <div className="rrc-bandwidth__actions">
              <button className="cs-btn cs-btn--gold" onClick={onOpen} style={{border:'none'}}>
                <i data-lucide="calendar-heart" style={{width:16,height:16}} />
                Get a Free Review
              </button>
            </div>
          </div>
        );
      }
      return (
        <div className="rrc-bandwidth">
          <p className="rrc-bandwidth__text">
            Don't have the bandwidth to go through this yourself?{' '}
            <span>Get a free review — no obligation.</span>
          </p>
          <div className="rrc-bandwidth__actions">
            <button className="cs-btn cs-btn--primary cs-btn--sm" onClick={onOpen} style={{border:'none'}}>
              <i data-lucide="calendar-heart" style={{width:15,height:15}} />
              Book a Meeting
            </button>
            <a className="cs-btn cs-btn--secondary cs-btn--sm" href={EMAIL} style={{textDecoration:'none'}}>
              <i data-lucide="mail" style={{width:15,height:15}} />
              Email Us
            </a>
          </div>
        </div>
      );
    }

    function CheckSection({ section }) {
      const [checked, setChecked] = React.useState({});
      const [notes, setNotes] = React.useState('');

      const toggle = (id) => setChecked(prev => ({ ...prev, [id]: !prev[id] }));
      const allDone = section.items.every(it => checked[it.id]);

      return (
        <div className="rrc-section">
          <div className="rrc-section__header">
            <i data-lucide={section.icon} className="rrc-section__icon" style={{width:22,height:22}} />
            <h2 className="rrc-section__title">{section.title}</h2>
            {allDone && (
              <i data-lucide="check-circle-2" style={{width:20,height:20,color:'var(--cs-gold)',marginLeft:'auto',flexShrink:0}} />
            )}
          </div>
          <div className="rrc-section__body">
            <ul className="rrc-items">
              {section.items.map(item => (
                <li key={item.id} className="rrc-item">
                  <input
                    type="checkbox"
                    className="rrc-item__cb"
                    checked={!!checked[item.id]}
                    onChange={() => toggle(item.id)}
                    id={item.id}
                  />
                  <label className="rrc-item__label" htmlFor={item.id}>{item.label}</label>
                </li>
              ))}
            </ul>
            <span className="rrc-notes-label">Notes</span>
            <textarea
              className="rrc-notes"
              placeholder="Add notes for this section…"
              value={notes}
              onChange={e => setNotes(e.target.value)}
            />
          </div>
        </div>
      );
    }

    function RenewalReportCard() {
      const [modalOpen, setModalOpen] = React.useState(false);

      React.useEffect(() => {
        window.lucide && window.lucide.createIcons();
      });

      return (
        <div data-screen-label="Renewal Report Card">
          <TopNav onCta={() => { window.location.href = 'contact.html'; }} />

          {/* Hero */}
          <div className="rrc-hero">
            <div className="rrc-hero__inner">
              <a className="rrc-back" href="index.html">
                <i data-lucide="arrow-left" style={{width:14,height:14}} /> Back to CharterSelect
              </a>
              <div className="rrc-hero__eyebrow">Charter School Insurance</div>
              <h1 className="rrc-hero__title">Renewal Report Card</h1>
              <p className="rrc-hero__lead">Walk through every coverage area before your next renewal. Check off items as you confirm them, and use the notes area in each section to capture anything that needs follow-up.</p>
            </div>
          </div>

          {/* Top bandwidth CTA */}
          <div style={{padding:'0 32px', maxWidth:'964px', margin:'0 auto'}}>
            <BandwidthCta onOpen={() => setModalOpen(true)} />
          </div>

          {/* Checklist sections */}
          <div className="rrc-body">
            {SECTIONS.map(section => (
              <CheckSection key={section.id} section={section} />
            ))}

            {/* Bottom bandwidth CTA */}
            <BandwidthCta onOpen={() => setModalOpen(true)} dark />
          </div>

          <Footer />

          {modalOpen && <BandwidthModal onClose={() => setModalOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RenewalReportCard />);
  </script>
</body>
</html>
