<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CharterSelect — Protection with Purpose.</title>
  <meta name="description" content="Charter school insurance specialists since 2011. Property, liability, employee benefits, and risk guidance built for charter schools — not adapted to them. Free benchmark review." />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css?v=2" />
  <link rel="icon" href="assets/logo-icon.png" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx?v=8"></script>
  <script type="text/babel">
    const { useEffect, useState } = React;
    function App() {
      const [toast, setToast] = useState(null);
      useEffect(() => { window.lucide && window.lucide.createIcons(); });
      useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 2400); return () => clearTimeout(t); } }, [toast]);
      const scrollTo = (id) => () => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView ? el.scrollIntoView({behavior:'smooth', block:'start'}) : window.scrollTo(0, el.offsetTop);
      };
      return (
        <div data-screen-label="Marketing Home">
          <TopNav onCta={scrollTo('contact')} />
          <Hero onPrimary={scrollTo('contact')} onSecondary={scrollTo('contact')} />
          <StatsBar />
          <Solutions />
          <FeaturedTestimonial />
          <WhyUs />
          <UploadCta />
          <Community />
          <Footer />
          {toast && <div style={{position:'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', background: 'var(--cs-charcoal)', color: '#fff', padding: '12px 20px', borderRadius: 999, fontSize: 14, boxShadow: 'var(--shadow-lg)', zIndex: 100}}>{toast}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
